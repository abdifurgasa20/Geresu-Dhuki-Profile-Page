<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - GERESU DHUKI SAVING AND CREDIT COOPERATIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Times New Roman', Times, serif;
    background: linear-gradient(to right, #4e73df, #1cc88a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.register-box {
    background-color: #fff;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 400px;
}
.register-box h4 {
    font-weight: bold;
    color: purple;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 25px;
}
.form-control { text-align: center; font-size: 16px; }
.btn-register {
    background: linear-gradient(to right, #4e73df, #1cc88a);
    color: white;
    font-weight: bold;
    border: none;
}
.btn-register:hover { background: linear-gradient(to right, #1cc88a, #4e73df); color:white; }
.position-relative .btn { top:50%; transform: translateY(-50%); }
a { color: #4e73df; }
</style>
</head>
<body>

<div class="register-box">
<h4>GERESU DHUKI SAVING AND CREDIT COOPERATIVE</h4>

<form onsubmit="register(event)">
    <div class="mb-3"><input type="text" id="fullName" class="form-control" placeholder="Full Name" required></div>
    <div class="mb-3"><input type="text" id="contact" class="form-control" placeholder="Email or Phone Number" required></div>

    <div class="mb-3 position-relative">
        <input type="password" id="password" class="form-control" placeholder="Password" required>
        <button type="button" id="togglePassword" class="btn position-absolute end-0 me-2 p-0 border-0 bg-transparent">
            <i class="bi bi-eye-fill fs-5 text-secondary"></i>
        </button>
    </div>

    <div class="mb-3 position-relative">
        <input type="password" id="rePassword" class="form-control" placeholder="Re-enter Password" required>
        <button type="button" id="toggleRePassword" class="btn position-absolute end-0 me-2 p-0 border-0 bg-transparent">
            <i class="bi bi-eye-fill fs-5 text-secondary"></i>
        </button>
    </div>

    <button type="submit" class="btn btn-register w-100 mb-2">Register</button>
    <div class="text-center"><a href="login.html">Back to Login</a></div>
</form>
</div>

<script>
let pendingMembers = JSON.parse(localStorage.getItem("pendingMembers")) || [];

// Eye toggle
function togglePasswordBtn(btnId, inputId){
    const btn = document.getElementById(btnId);
    const input = document.getElementById(inputId);
    btn.addEventListener('click', () => {
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.querySelector('i').classList.toggle('bi-eye-fill');
        btn.querySelector('i').classList.toggle('bi-eye-slash-fill');
    });
}
togglePasswordBtn('togglePassword','password');
togglePasswordBtn('toggleRePassword','rePassword');

// Register function
function register(event){
    event.preventDefault();
    const fullName = document.getElementById('fullName').value.trim();
    const contact = document.getElementById('contact').value.trim();
    const password = document.getElementById('password').value;
    const rePassword = document.getElementById('rePassword').value;

    if(password !== rePassword){ alert("Passwords do not match!"); return; }
    if(pendingMembers.find(acc => acc.contact===contact)){ alert("Already registered, waiting for approval."); return; }

    const newPending = { name: fullName, contact: contact, password: password, status:"pending" };
    pendingMembers.push(newPending);
    localStorage.setItem("pendingMembers", JSON.stringify(pendingMembers));

    alert("Registration submitted! Wait for admin approval.");
    window.location.href = "login.html";
}
</script>
</
