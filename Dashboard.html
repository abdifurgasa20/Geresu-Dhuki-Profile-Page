<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Geresu Dhuki Cooperative</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family: "Times New Roman", serif;
    background: linear-gradient(to right,#4e73df,#1cc88a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.dashboard-box{
    width:90%;
    max-width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.25);
    text-align:center;
}

.card-box{
    background:#00cfff33;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="dashboard-box">

<h3>Admin Dashboard</h3>

<h4 id="welcomeUser">Welcome</h4>

<div class="card-box">Total Members : 0</div>
<div class="card-box">Total Savings : 0 ETB</div>
<div class="card-box">Total Loans : 0 ETB</div>

<button class="btn btn-danger mt-3 w-100" onclick="logout()">Logout</button>

</div>

<script>

// Show logged user name
let user = JSON.parse(localStorage.getItem("loggedIn"));

if(user){
    document.getElementById("welcomeUser").innerText =
    "Welcome " + user.name;
}

// Logout function
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}

</script>

</body>
</html>
