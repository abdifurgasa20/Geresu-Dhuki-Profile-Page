<!DOCTYPE html>
<html>
<head>

<title>🏦 GOD LEVEL Cooperative Bank</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Times New Roman;
padding:40px;
}

.fin-card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
transition:0.3s;
}

.fin-card:hover{
transform:translateY(-8px);
}

</style>

</head>

<body>

<h2 class="text-center">🏦 GOD LEVEL COOPERATIVE BANK</h2>

<h5 id="welcome"></h5>

<div class="row mt-4">

<div class="col-md-3">
<div class="fin-card text-center">
Members
<h3 id="members"></h3>
</div>
</div>

<div class="col-md-3">
<div class="fin-card text-center">
Total Savings
<h3 id="savings"></h3>
</div>
</div>

<div class="col-md-3">
<div class="fin-card text-center">
Loans
<h3 id="loans"></h3>
</div>
</div>

<div class="col-md-3">
<div class="fin-card text-center">
Penalty
<h3 id="penalty"></h3>
</div>
</div>

</div>

<canvas id="chart" class="mt-5"></canvas>

<button class="btn btn-danger w-100 mt-4" onclick="logout()">
Logout
</button>

<script>

/* Session Guard */
let user=JSON.parse(localStorage.getItem("loggedIn"));

if(!user){
location.href="index.html";
}

document.getElementById("welcome").innerText=
"Welcome Supreme Admin " + user.name;

/* Load Database */

let accounts=JSON.parse(localStorage.getItem("accounts")||"[]");

let members=accounts.length;

/* Financial Engine */

let savings=members*1500;
let loans=members*800;

let penalty=calculatePenalty(savings,30);

/* Display */

document.getElementById("members").innerText=members;
document.getElementById("savings").innerText=savings+" ETB";
document.getElementById("loans").innerText=loans+" ETB";
document.getElementById("penalty").innerText=penalty.toFixed(2)+" ETB";

/* Chart */

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Members","Savings","Loans","Penalty"],
datasets:[{
label:"Financial Analytics",
data:[members,savings,loans,penalty],
borderWidth:2
}]
},
options:{
responsive:true
}
});

function logout(){
localStorage.removeItem("loggedIn");
location.href="index.html";
}

</script>

<script src="js/finance-engine.js"></script>

</body>
</html>
