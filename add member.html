<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Members - GERESU DHUKI SAVING AND CREDIT COOPERATIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f8f9fa;
        }

        .header {
            background-color: purple;
            color: white;
            padding: 20px;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-add {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            color: white;
            font-weight: bold;
            border: none;
        }

        .btn-add:hover {
            background: linear-gradient(to right, #1cc88a, #4e73df);
            color: white;
        }

        .table th {
            background-color: #6f42c1;
            color: white;
            text-align: center;
        }

        .table td {
            text-align: center;
        }

        .modal-header {
            background-color: purple;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">
    GERESU DHUKI SAVING AND CREDIT COOPERATIVE - Members
</div>

<div class="container mt-4">
    <button class="btn btn-add mb-3" data-bs-toggle="modal" data-bs-target="#memberModal">
        + Add New Member
    </button>

    <table class="table table-bordered table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email/Phone</th>
                <th>Join Date</th>
                <th>Initial Savings</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="memberTable">
            <!-- Members will be added here dynamically -->
        </tbody>
    </table>
</div>

<!-- Member Modal -->
<div class="modal fade" id="memberModal" tabindex="-1" aria-labelledby="memberModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="memberModalLabel">Add New Member</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="memberForm">
            <input type="hidden" id="memberId">
            <div class="mb-3">
                <input type="text" id="memberName" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="text" id="memberContact" class="form-control" placeholder="Email or Phone Number" required>
            </div>
            <div class="mb-3">
                <input type="date" id="memberJoin" class="form-control" required>
            </div>
            <div class="mb-3">
                <input type="number" id="memberSavings" class="form-control" placeholder="Initial Savings" required>
            </div>
            <button type="submit" class="btn btn-add w-100">Save Member</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let members = [];
let idCounter = 1;

function renderTable() {
    const table = document.getElementById('memberTable');
    table.innerHTML = '';
    members.forEach(member => {
        table.innerHTML += `
            <tr>
                <td>${member.id}</td>
                <td>${member.name}</td>
                <td>${member.contact}</td>
                <td>${member.joinDate}</td>
                <td>$${member.savings}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-1" onclick="editMember(${member.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteMember(${member.id})">Delete</button>
                </td>
            </tr>
        `;
    });
}

// Add or Update Member
document.getElementById('memberForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('memberName').value;
    const contact = document.getElementById('memberContact').value;
    const joinDate = document.getElementById('memberJoin').value;
    const savings = document.getElementById('memberSavings').value;
    const memberId = document.getElementById('memberId').value;

    if(memberId) {
        // Update
        const index = members.findIndex(m => m.id == memberId);
        members[index] = {id: parseInt(memberId), name, contact, joinDate, savings};
    } else {
        // Add
        members.push({id: idCounter++, name, contact, joinDate, savings});
    }

    // Reset form
    this.reset();
    document.getElementById('memberId').value = '';
    renderTable();

    // Hide modal
    const modal = bootstrap.Modal.getInstance(document.getElementById('memberModal'));
    modal.hide();
});

// Edit Member
function editMember(id) {
    const member = members.find(m => m.id === id);
    document.getElementById('memberId').value = member.id;
    document.getElementById('memberName').value = member.name;
    document.getElementById('memberContact').value = member.contact;
    document.getElementById('memberJoin').value = member.joinDate;
    document.getElementById('memberSavings').value = member.savings;

    const modal = new bootstrap.Modal(document.getElementById('memberModal'));
    modal.show();
}

// Delete Member
function deleteMember(id) {
    if(confirm('Are you sure you want to delete this member?')) {
        members = members.filter(m => m.id !== id);
        renderTable();
    }
}

// Initial render
renderTable();
</script>

</body>
</html>
