<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - GERESU DHUKI SAVING AND CREDIT COOPERATIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(to right, #1cc88a, #4e73df);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .forgot-box {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 400px;
        }

        .forgot-box h4 {
            font-weight: bold;
            color: purple;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-control {
            text-align: center;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            color: white;
            font-weight: bold;
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #1cc88a, #4e73df);
            color: white;
        }

        .position-relative .btn {
            top: 50%;
            transform: translateY(-50%);
        }

        a {
            color: #4e73df;
        }
    </style>
</head>
<body>

<div class="forgot-box">
    <h4>Forgot Password</h4>

    <!-- Step 1: Enter Email/Phone -->
    <div id="step1">
        <p class="text-center">Enter your Email or Phone Number to reset password</p>
        <div class="mb-3">
            <input type="text" id="contactInput" class="form-control" placeholder="Email or Phone Number" required>
        </div>
        <button class="btn btn-primary w-100 mb-2" onclick="sendOTP()">Send OTP</button>
        <div class="text-center">
            <a href="login.html">Back to Login</a>
        </div>
    </div>

    <!-- Step 2: Enter OTP -->
    <div id="step2" style="display:none;">
        <p class="text-center">Enter the OTP sent to your Email/Phone</p>
        <div class="mb-3">
            <input type="text" id="otpInput" class="form-control" placeholder="Enter OTP" required>
        </div>
        <button class="btn btn-primary w-100 mb-2" onclick="verifyOTP()">Verify OTP</button>
    </div>

    <!-- Step 3: Reset Password -->
    <div id="step3" style="display:none;">
        <p class="text-center">Enter your new password</p>
        <div class="mb-3 position-relative">
            <input type="password" id="newPassword" class="form-control" placeholder="New Password" required>
            <button type="button" id="toggleNewPassword" class="btn position-absolute end-0 me-2 p-0 border-0 bg-transparent">
                <i class="bi bi-eye-fill fs-5 text-secondary"></i>
            </button>
        </div>
        <div class="mb-3 position-relative">
            <input type="password" id="rePassword" class="form-control" placeholder="Re-enter Password" required>
            <button type="button" id="toggleRePassword" class="btn position-absolute end-0 me-2 p-0 border-0 bg-transparent">
                <i class="bi bi-eye-fill fs-5 text-secondary"></i>
            </button>
        </div>
        <button class="btn btn-primary w-100 mb-2" onclick="resetPassword()">Reset Password</button>
    </div>
</div>

<script>
    // Load accounts from localStorage
    let accounts = JSON.parse(localStorage.getItem("accounts")) || [];
    let currentUser = null;
    let generatedOTP = null;

    // Toggle password function
    function togglePassword(btnId, inputId){
        const toggleBtn = document.getElementById(btnId);
        const input = document.getElementById(inputId);

        toggleBtn.addEventListener('click', () => {
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;

            const icon = toggleBtn.querySelector('i');
            icon.classList.toggle('bi-eye-fill');
            icon.classList.toggle('bi-eye-slash-fill');
        });
    }

    togglePassword('toggleNewPassword','newPassword');
    togglePassword('toggleRePassword','rePassword');

    // Step 1: Send OTP
    function sendOTP() {
        const contact = document.getElementById('contactInput').value;
        const user = accounts.find(acc => acc.contact === contact);

        if(!user){
            alert("Account not found!");
            return;
        }

        currentUser = user;

        // Generate random 4-digit OTP (demo)
        generatedOTP = Math.floor(1000 + Math.random() * 9000);
        alert("Your OTP is: " + generatedOTP);

        // Show OTP step
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    // Step 2: Verify OTP
    function verifyOTP() {
        const otpInput = document.getElementById('otpInput').value;
        if(parseInt(otpInput) === generatedOTP){
            alert("OTP verified successfully!");
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
        } else {
            alert("Incorrect OTP! Try again.");
        }
    }

    // Step 3: Reset Password
    function resetPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const rePassword = document.getElementById('rePassword').value;

        if(newPassword !== rePassword){
            alert("Passwords do not match!");
            return;
        }

        // Update password
        accounts = accounts.map(acc => {
            if(acc.contact === currentUser.contact){
                acc.password = newPassword;
            }
            return acc;
        });

        localStorage.setItem("accounts", JSON.stringify(accounts));
        alert("Password reset successfully! Please login.");

        // Redirect to login page
        window.location.href = "login.html";
    }
</script>

</body>
</html>
